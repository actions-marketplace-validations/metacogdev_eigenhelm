site_name: eigenhelm
site_url: https://eigenhelm.sh
site_description: A conscience for agents, not an agent — language-agnostic code aesthetic evaluation
site_author: metacogdev
repo_url: https://github.com/metacogdev/eigenhelm
repo_name: metacogdev/eigenhelm
edit_uri: ""

copyright: Copyright &copy; 2026 metacogdev

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest
    - toc.follow

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/metacogdev/eigenhelm
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/eigenhelm/

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/install.md
      - Quick Start: getting-started/quickstart.md
      - Configuration: getting-started/configuration.md
  - Concepts:
      - How It Works: concepts/how-it-works.md
      - Scoring Dimensions: concepts/dimensions.md
      - Directives: concepts/directives.md
      - Models: concepts/models.md
  - CLI Reference:
      - evaluate: cli/evaluate.md
      - train: cli/train.md
      - inspect: cli/inspect.md
      - serve: cli/serve.md
      - harness: cli/harness.md
      - corpus: cli/corpus.md
      - init: cli/init.md
  - Integrations:
      - GitHub Action: integrations/github-action.md
      - Pre-commit Hook: integrations/pre-commit.md
      - HTTP API: integrations/http-api.md
      - AI Agent Skills: integrations/agent-skills.md
  - Contributing: contributing.md
  - License: license.md
